# Tech Digest - 信息源配置
# network: direct = 国内直连 | proxy = 走 Clash 代理(127.0.0.1:7897)
# type: rss = RSS 抓取 | arxiv = ArXiv API | html = 网页爬取

output:
  max_articles_per_source: 10
  # 输出目录（留空则输出到 Skill 安装目录下的 digests/ 子目录）
  # 示例: output_dir: "C:/Users/你的用户名/Documents/tech_digest_output"
  output_dir: ""

sources:
  # 国内 AI 垂直媒体（直连）
  - name: "量子位"
    rss_url: "https://www.qbitai.com/feed"
    type: "rss"
    category: "AI 垂直媒体"
    network: "direct"

  - name: "新智元"
    url: "https://aiera.com.cn/"
    type: "html"
    category: "AI 垂直媒体"
    network: "direct"

  - name: "雷锋网"
    rss_url: "https://www.leiphone.com/feed"
    type: "rss"
    category: "AI 垂直媒体"
    network: "direct"

  # 前沿科技媒体（直连）
  - name: "爱范儿"
    rss_url: "https://www.ifanr.com/feed"
    type: "rss"
    category: "前沿科技"
    network: "direct"

  - name: "Solidot"
    rss_url: "https://www.solidot.org/index.rss"
    type: "rss"
    category: "前沿科技"
    network: "direct"

  - name: "少数派"
    rss_url: "https://sspai.com/feed"
    type: "rss"
    category: "前沿科技"
    network: "direct"

  # AI 研究机构（代理）
  - name: "Google DeepMind"
    rss_url: "https://deepmind.google/blog/rss.xml"
    type: "rss"
    category: "AI 研究"
    network: "proxy"

  - name: "OpenAI"
    rss_url: "https://openai.com/blog/rss.xml"
