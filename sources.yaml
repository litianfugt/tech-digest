    network: "proxy"

  # 学术论文 - ArXiv（代理）
  - name: "ArXiv AI"
    type: "arxiv"
    arxiv_category: "cs.AI"
    category: "学术论文"
    network: "proxy"

  - name: "ArXiv ML"
