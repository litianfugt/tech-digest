# Tech Digest 邮件配置
# 复制 .env.example 为 .env，填入你的邮箱凭据

email:
  # SMTP 服务器配置
  smtp:
    host: ""           # 如 smtp.163.com
    port: 465
    secure: true       # 465 用 true，587 用 false
    user: ""           # 你的邮箱地址
    pass: ""           # SMTP 授权码（不是登录密码！）
  
  # 发件人信息
  from_name: "克洛 AI 助理"
  
  # 默认收件人
  default_to: ""       # 你的邮箱地址
  
  # 报告署名
  author_name: "克洛 AI 助理"

# 获取 SMTP 授权码的方法：
# 163.com: 登录网页版 → 设置 → POP3/SMTP/IMAP → 开启 SMTP → 生成授权码
# Gmail: Google 账户 → 安全 → 应用密码
# Outlook: 账户设置 → 安全 → 应用密码
# QQ: 邮箱设置 → 账户 → 生成授权码
